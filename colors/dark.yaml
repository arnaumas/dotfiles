# dark colorscheme
# based on vague

# special-purpose roles
special:
  background:  "#141415"
  foreground:  "#cdcdcd"
  cursor:      "#cdcdcd"
  cursor_text: "#141415"

# ANSI slots
ansi:
  0:  "#cdcdcd"  # white
  1:  "#d8647e"  # red
  2:  "#7fa563"  # green
  3:  "#f3be7c"  # yellow
  4:  "#6e94b2"  # blue
  5:  "#bb9dbd"  # magenta
  6:  "#6ababa"  # cyan
  7:  "#383848"  # white
  8:  "#606079"  # dim black
  9:  "#4f2c35"  # dim red
  10: "#34402c"  # dim green
  11: "#574734"  # dim yellow
  12: "#2f3a44"  # dim blue
  13: "#463d47"  # dim magenta
  14: "#2e4647"  # dim cyan
  15: "#1c1c24"  # dim white
