# dark colorscheme
# based on vague

# special-purpose roles
special:
  background:  "#141415"
  foreground:  "#cdcdcd"
  cursor:      "#cdcdcd"
  cursor_text: "#141415"

# ANSI slots
ansi:
  0:  "#cdcdcd"  # white
  1:  "#d8647e"  # red
  2:  "#7fa563"  # green
  3:  "#f3be7c"  # yellow
  4:  "#6e94b2"  # blue
  5:  "#bb9dbd"  # magenta
  6:  "#6ababa"  # cyan
  7:  "#252530"  # white
  8:  "#606079"  # dim black
  9:  "#e08398"  # dim red
  10: "#99b782"  # dim green
  11: "#f5cb96"  # dim yellow
  12: "#8ba9c1"  # dim blue
  13: "#c9b1ca"  # dim magenta
  14: "#bebeda"  # dim cyan
  15: "#1c1c24"  # dim white
