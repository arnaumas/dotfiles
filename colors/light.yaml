# light colors
#
# single source of truth for the terminal-anchored 16-color ANSI scheme,
# independent of any app. Mirror these values into every consumer:
#   - ghostty/.config/ghostty/themes/edge
#   - iterm2/.config/iterm2/edge-light.itermcolors
#   - nvim colors/edge-ansi.lua (slots 0-15)
#   - zsh (syntax-highlighting, fzf, fzf-tab, pure prompt)
#
# Hex values are reference only; nvim runs with termguicolors OFF and reads
# the live terminal slots — keep the terminal emulators authoritative there.
#
# based on the edge-light colorscheme

# special-purpose roles
special:
  background:           "#fafafa"
  foreground:           "#4b505b"
  cursor:               "#5079be"
  cursor_text:          "#fafafa"
  selection_background: "#e8ebf0"
  selection_foreground: "#4b505b"

# the 16 ANSI slots: normal (0-7) then bright (8-15)
ansi:
  0:  "#4b505b"  # black
  1:  "#d05858"  # red
  2:  "#608e32"  # green
  3:  "#be7e05"  # yellow
  4:  "#5079be"  # blue
  5:  "#b05ccc"  # magenta
  6:  "#3a8b84"  # cyan
  7:  "#dde2e7"  # white
  8:  "#aab1bd"  # bright black
  9:  "#e06464"  # bright red
  10: "#7aad33"  # bright green
  11: "#e09600"  # bright yellow
  12: "#4f8ae0"  # bright blue
  13: "#c468e6"  # bright magenta
  14: "#44a89e"  # bright cyan
  15: "#eef1f4"  # bright white
