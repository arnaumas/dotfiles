# vague
#
# single source of truth for the terminal-anchored 16-color ANSI scheme,
# independent of any app, set only for ghostty
#   - ghostty/.config/ghostty/themes/edge

# special-purpose roles
special:
  background:  "#141415"
  foreground:  "#cdcdcd"
  cursor:      "#cdcdcd"
  cursor_text: "#141415"

# the 16 ANSI slots: normal (0-7) then bright (8-15)
ansi:
  0:  "#cdcdcd"  # black         (fg: main foreground)
  1:  "#d8647e"  # red
  2:  "#7fa563"  # green
  3:  "#f3be7c"  # yellow
  4:  "#6e94b2"  # blue
  5:  "#bb9dbd"  # magenta
  6:  "#aeaed1"  # cyan
  7:  "#252530"  # white         (bg: active UI surface)
  8:  "#606079"  # bright black  (dim_fg: comments, dim text)
  9:  "#e08398"  # bright red
  10: "#99b782"  # bright green
  11: "#f5cb96"  # bright yellow
  12: "#8ba9c1"  # bright blue
  13: "#c9b1ca"  # bright magenta
  14: "#bebeda"  # bright cyan
  15: "#1c1c24"  # bright white  (dim_bg: faintest surface, nearest bg)
