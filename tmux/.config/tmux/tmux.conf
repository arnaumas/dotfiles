set -a terminal-features "tmux-256color:RGB"
set -g extended-keys on
set -g prefix C-a
set -g base-index 1
set -g renumber-windows on
set -g mode-keys vi

set -g status-position bottom
set -g status-justify left
set -g status-style "bg=color15"
set -g status-interval 5
set -g status-right "#[fg=color15,bg=colour3,bold] #S #[default]"
set -g status-left ""
set -g window-status-separator "  "
set -g window-status-format "#[fg=colour8] #I: #W#{?window_zoomed_flag, Z,} #[default]"
set -g window-status-current-format "#{?client_prefix,#[bg=colour9 fg=colour9] ,}#[fg=colour0 bg=colour7 bold] #I: #W#{?window_zoomed_flag, Z,} #[default]"

set -g window-active-style "fg=default"
set -g pane-border-style "fg=color8"

set -g message-style "fg=colour0,bg=colour15"
set -g message-command-style "fg=colour0,bg=colour15"

# copy mode vim movements
bind v copy-mode
bind -T copy-mode-vi C-u send -X halfpage-up
bind -T copy-mode-vi C-d send -X halfpage-down
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
set -g mode-style "bg=colour7"
set -g copy-mode-match-style "bg=colour7"
set -g copy-mode-current-match-style "bg=colour11"

# pane navigation
bind s split-window -v
bind S split-window -h
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind x kill-window

bind r source-file "~/.config/tmux/tmux.conf"
